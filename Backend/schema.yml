  /api/calculadoras/:
    get:
      operationId: calculadoras_list
      description: |-
        ViewSet for obstetric risk calculators based on FMF protocols.

        Provides risk calculations for preeclampsia, trisomies, and gestational diabetes
        using Bayesian models adjusted for high-altitude conditions (La Paz, Bolivia).

        **Endpoints:**
        - `POST /api/calculadoras/calcular-preeclampsia/` - Calculate preeclampsia risk
        - `POST /api/calculadoras/calcular-trisomias/` - Calculate trisomy 21, 18, 13 risk
        - `POST /api/calculadoras/calcular-diabetes/` - Calculate gestational diabetes risk
        - `GET  /api/calculadoras/` - List all risk calculations
        - `GET  /api/calculadoras/{id}/` - Get specific calculation details

        **Authentication:** JWT Bearer token required
        **Permissions:** Authenticated users
      parameters:
      - in: query
        name: categoria_riesgo
        schema:
          type: string
          x-spec-enum-id: 222bf64098a89671
          nullable: true
          title: Categoría de Riesgo
          enum:
          - alto
          - bajo
          - critico
          - intermedio
        description: |-
          * `bajo` - Bajo Riesgo
          * `intermedio` - Riesgo Intermedio
          * `alto` - Alto Riesgo
          * `critico` - Riesgo Crítico
      - in: query
        name: edad_gestacional_semanas
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - in: query
        name: paciente
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      - in: query
        name: tipo
        schema:
          type: string
          x-spec-enum-id: 31e90a6700b1fc79
          title: Tipo de Calculadora
          enum:
          - aborto
          - anemia_fetal
          - diabetes_gestacional
          - macrosomia
          - obito
          - parto_pretermino
          - preeclampsia
          - sga_rciu
          - trisomias
        description: |-
          * `preeclampsia` - Preeclampsia
          * `trisomias` - Trisomías (21, 18, 13)
          * `diabetes_gestacional` - Diabetes Gestacional
          * `sga_rciu` - Restricción Crecimiento (SGA/RCIU)
          * `parto_pretermino` - Parto Pretérmino
          * `macrosomia` - Macrosomía Fetal
          * `aborto` - Aborto Espontáneo
          * `obito` - Óbito Fetal
          * `anemia_fetal` - Anemia Fetal
      tags:
      - calculadoras
      security:
      - jwtAuth: []
      - cookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCalculadoraRiesgoList'
          description: ''
    post:
      operationId: calculadoras_create
      description: |-
        ViewSet for obstetric risk calculators based on FMF protocols.

        Provides risk calculations for preeclampsia, trisomies, and gestational diabetes
        using Bayesian models adjusted for high-altitude conditions (La Paz, Bolivia).

        **Endpoints:**
        - `POST /api/calculadoras/calcular-preeclampsia/` - Calculate preeclampsia risk
        - `POST /api/calculadoras/calcular-trisomias/` - Calculate trisomy 21, 18, 13 risk
        - `POST /api/calculadoras/calcular-diabetes/` - Calculate gestational diabetes risk
