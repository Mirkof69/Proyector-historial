_format_version: "3.0"
_transform: true

# ═══════════════════════════════════════════════════════════════════════════════
# KONG DECLARATIVE CONFIG — Fetal Medical Bolivia
# Aplica: JWT auth + rate limiting + CORS + request logging
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── Backend Django API ────────────────────────────────────────────────────
  - name: django-api
    url: http://backend:8000
    connect_timeout: 10000
    write_timeout: 60000
    read_timeout: 60000

    routes:
      - name: api-route
        paths:
          - /api
        strip_path: false
        preserve_host: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
          - HEAD

    plugins:
      # ── JWT — valida tokens SimpleJWT emitidos por Django ─────────────────
      - name: jwt
        config:
          uri_param_names:
            - jwt
          cookie_names: []
          key_claim_name: iss
          claims_to_verify:
            - exp
          maximum_expiration: 86400  # 24h máximo
          # Rutas públicas excluidas de JWT (se configuran como rutas separadas)

      # ── Rate Limiting — protege contra brute-force y DDoS ─────────────────
      - name: rate-limiting
        config:
          second: 10
          minute: 120
          hour: 2000
          day: 20000
          policy: local
          fault_tolerant: true
          hide_client_headers: false
          redis_ssl: false

      # ── CORS — permite acceso desde frontend React ─────────────────────────
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:5173"
            - "http://localhost:80"
            - "https://*.loca.lt"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
            - HEAD
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Authorization
            - X-Auth-Token
            - bypass-tunnel-reminder
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600
          preflight_continue: false

      # ── Request Size Limiting — previene uploads maliciosos ────────────────
      - name: request-size-limiting
        config:
          allowed_payload_size: 50  # MB (ecografías pueden ser grandes)

  # ── Rutas PÚBLICAS (sin JWT) ──────────────────────────────────────────────
  - name: public-auth-endpoints
    url: http://backend:8000
    routes:
      - name: login-route
        paths:
          - /api/usuarios/login/
          - /api/usuarios/mfa-verify/
          - /api/usuarios/refresh/
        strip_path: false
        methods:
          - POST
          - OPTIONS

    plugins:
      - name: rate-limiting
        config:
          second: 3
          minute: 20
          hour: 100
          policy: local
          fault_tolerant: true

      - name: cors
        config:
          origins:
            - "*"
          methods:
            - POST
            - OPTIONS
          headers:
            - Content-Type
            - Authorization
          credentials: true

  # ── Microservicio FastAPI (IA/CNN) — solo acceso interno ──────────────────
  - name: ia-microservice
    url: http://ia_service:8001
    routes:
      - name: ia-internal-route
        paths:
          - /internal/ia
        strip_path: true
    plugins:
      - name: ip-restriction
        config:
          allow:
            - 172.16.0.0/12   # Red Docker interna
            - 10.0.0.0/8
            - 127.0.0.1

# ── Consumidores JWT (usuarios del sistema) ────────────────────────────────
consumers:
  - username: fetal-medical-frontend
    jwt_secrets:
      - key: fetal-medical-frontend
        algorithm: HS256
        secret: "${KONG_JWT_SECRET}"

  - username: ia-microservice-internal
    jwt_secrets:
      - key: ia-service
        algorithm: HS256
        secret: "${KONG_IA_SECRET}"
