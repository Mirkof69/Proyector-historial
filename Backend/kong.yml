_format_version: "3.0"

services:
  - name: django-backend
    url: http://django:8000
    routes:
      - name: django-api-route
        paths:
          - /api/
        strip_path: false
        protocols:
          - https
    plugins:
      - name: rate-limiting
        config:
          minute: 200
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_claim_name: jti
          secret_is_base64: false

  - name: react-frontend
    url: http://frontend:3000
    routes:
      - name: frontend-route
        paths:
          - /
        strip_path: false
        protocols:
          - https
    plugins:
      - name: rate-limiting
        config:
          minute: 500
          policy: local

  - name: fastapi-microservicio
    url: http://fastapi:8001
    routes:
      - name: fastapi-api-route
        paths:
          - /ml-api/
        strip_path: true
        protocols:
          - https
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: mtls-auth
        config:
          ca_certificates:
            - ${VAULT_CA_CERT_ID}
          skip_consumer_lookup: false

  - name: orthanc-pacs
    url: http://orthanc:8042
    routes:
      - name: orthanc-dicom-route
        paths:
          - /dicom/
        strip_path: true
        protocols:
          - https
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_claim_name: jti
          secret_is_base64: false

consumers:
  # Consumer principal: aplicación Django/Frontend
  # El JWT que genera Django (SimpleJWT) usa este key/secret para firmar.
  # El secret DEBE coincidir con Django SECRET_KEY en producción o con
  # un secret dedicado configurado en SIMPLE_JWT['SIGNING_KEY'].
  - username: fetal-app
    jwt_secrets:
      - key: fetal-app-key
        algorithm: HS256
        # secret: debe coincidir con SIMPLE_JWT['SIGNING_KEY'] en settings.py
        # En producción inyectar desde Vault. Para desarrollo usar el mismo SECRET_KEY.
        secret: django-insecure-fetal-medical-bolivia-2026-production-key-change-this

  # Consumer para el Microservicio IA (FastAPI) al llamar endpoints internos
  - username: ia-service
    jwt_secrets:
      - key: ia-service-key
        algorithm: HS256
        secret: django-insecure-fetal-medical-bolivia-2026-production-key-change-this

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "https://fetalmedical.com"
        - "https://fetalmedical.bo"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Auth-Token
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600
