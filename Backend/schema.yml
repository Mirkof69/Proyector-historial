  /api/reportes/reportes-generados/:
    get:
      operationId: reportes_reportes_generados_list
      description: |-
        Gestión de instancias de reportes generados.
        Permite crear solicitudes de reporte, ver detalle y consultar estadísticas.
      parameters:
      - in: query
        name: estado
        schema:
          type: string
          x-spec-enum-id: b9c75b96c01ae607
          title: ' Estado del reporte'
          enum:
          - completado
          - error
          - expirado
          - pendiente
          - procesando
        description: |-
          * `pendiente` - ⏳ Pendiente
          * `procesando` - ⚙️ Procesando
          * `completado` - ✅ Completado
          * `error` - ❌ Error
          * `expirado` - ⏰ Expirado
      - in: query
        name: fecha_completado
        schema:
          type: string
          format: date-time
      - in: query
        name: fecha_solicitud
        schema:
          type: string
          format: date-time
      - in: query
        name: formato
        schema:
          type: string
          x-spec-enum-id: 42e73a950fb9e284
          title: ' Formato de descarga'
          enum:
          - csv
          - excel
          - json
          - pd
        description: |-
          * `pd` -  PDF
          * `excel` -  Excel
          * `csv` -  CSV
          * `json` - ⚙️ JSON
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      - in: query
        name: tipo_reporte
        schema:
          type: integer
      - in: query
        name: usuario_solicitante
        schema:
          type: integer
      tags:
      - reportes
      security:
      - jwtAuth: []
      - cookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReporteGeneradoResumenList'
          description: ''
    post:
      operationId: reportes_reportes_generados_create
      description: |-
        Gestión de instancias de reportes generados.
        Permite crear solicitudes de reporte, ver detalle y consultar estadísticas.
      tags:
