name: CD Pipeline

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  IMAGE_NAME_AI: ${{ github.repository }}/ai-service
  POSTGRES_DB: historial
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_NAME: historial
  DB_USER: postgres
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_HOST: localhost
  DB_PORT: 5432
  SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
  DEBUG: "False"
  ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
  CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
  CSRF_TRUSTED_ORIGINS: ${{ secrets.CSRF_TRUSTED_ORIGINS }}
  CSRF_COOKIE_SECURE: "True"
  SESSION_COOKIE_SECURE: "True"
  SECURE_SSL_REDIRECT: "True"
  SECURE_HSTS_SECONDS: "31536000"
  SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
  SECURE_HSTS_PRELOAD: "True"
  TF_CPP_MIN_LOG_LEVEL: "2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # WAIT FOR CI
  # ──────────────────────────────────────────────
  wait-for-ci:
    name: Wait for CI Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for CI checks to pass
        uses: "lewagon/wait-on-check-action@v1.3.2"
        with:
          ref: ${{ github.ref }}
          check-name: "CI Summary"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

  # ──────────────────────────────────────────────
  # BUILD AND PUSH DOCKER IMAGES
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [wait-for-ci]
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image:
          - name: backend
            dockerfile: Backend/Dockerfile.backend
            context: ./Backend
          - name: frontend
            dockerfile: Backend/Dockerfile.frontend
            context: ./Backend
          - name: ai-service
            dockerfile: Backend/Microservicio_IA/Dockerfile
            context: ./Backend/Microservicio_IA

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_${{ matrix.image.name }} }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Output image digest
        run: |
          echo "Built and pushed ${{ matrix.image.name }} image"
          echo "Tags: ${{ steps.meta.outputs.tags }}"

  # ──────────────────────────────────────────────
  # DEPLOY TO PRODUCTION
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-and-push]
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deployment variables
        run: |
          echo "DEPLOY_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "DEPLOY_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "DEPLOY_REF=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: DEPLOY_TIME,DEPLOY_SHA,DEPLOY_REF
          script: |
            set -e

            echo "=== Starting deployment at $DEPLOY_TIME ==="
            echo "Deploying SHA: $DEPLOY_SHA"
            echo "Branch: $DEPLOY_REF"

            # Navigate to project directory
            cd ${{ secrets.DEPLOY_PATH }} || exit 1

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Create/update .env.production from secrets
            cat > .env.production << 'EOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            CSRF_TRUSTED_ORIGINS=${{ secrets.CSRF_TRUSTED_ORIGINS }}
            DEBUG=False
            CSRF_COOKIE_SECURE=True
            SESSION_COOKIE_SECURE=True
            SECURE_SSL_REDIRECT=True
            SECURE_HSTS_SECONDS=31536000
            SECURE_HSTS_INCLUDE_SUBDOMAINS=True
            SECURE_HSTS_PRELOAD=True
            EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
            EOF

            # Pull latest Docker images
            export COMPOSE_DOCKER_CLI_BUILD=1
            export DOCKER_BUILDKIT=1
            docker compose pull || true

            # Recreate containers with zero-downtime strategy
            docker compose up -d --remove-orphans

            # Wait for services to be healthy
            echo "Waiting for services to start..."
            sleep 15

            # Run database migrations
            docker compose exec -T backend python manage.py migrate --noinput || true

            # Collect static files
            docker compose exec -T backend python manage.py collectstatic --noinput || true

            # Health checks
            echo "Running health checks..."
            max_retries=10
            retry_count=0

            while [ $retry_count -lt $max_retries ]; do
              backend_status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health/ 2>/dev/null || echo "000")
              if [ "$backend_status" = "200" ] || [ "$backend_status" = "404" ]; then
                echo "Backend is responding (HTTP $backend_status)"
                break
              fi
              retry_count=$((retry_count + 1))
              echo "Retry $retry_count/$max_retries - waiting for backend..."
              sleep 5
            done

            if [ $retry_count -eq $max_retries ]; then
              echo "WARNING: Backend health check failed after $max_retries retries"
            fi

            # Clean up old Docker images
            docker image prune -f --filter "until=24h" || true

            echo "=== Deployment completed successfully ==="

      - name: Verify deployment
        run: |
          echo "Deployment verified"
          echo "SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Time: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

  # ──────────────────────────────────────────────
  # DEPLOYMENT NOTIFICATION
  # ──────────────────────────────────────────────
  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-production]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        with:
          payload: |
            {
              "text": "Fetal Medical System - Deployment ${{ needs.deploy-production.result }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Fetal Medical System - Deployment ${{ needs.deploy-production.result }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ needs.deploy-production.result }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Create GitHub Deployment Status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ needs.deploy-production.result }}' === 'success' ? 'success' : 'failure';
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              context: 'Deployment to Production',
              description: status === 'success'
                ? 'Successfully deployed to production'
                : 'Deployment to production failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
