name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  POSTGRES_DB: historial
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres_test_password
  DB_NAME: historial
  DB_USER: postgres
  DB_PASSWORD: postgres_test_password
  DB_HOST: localhost
  DB_PORT: 5432
  SECRET_KEY: ci-test-secret-key-change-in-production
  DEBUG: "False"
  ALLOWED_HOSTS: localhost,127.0.0.1
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
  CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
  CSRF_COOKIE_SECURE: "False"
  SESSION_COOKIE_SECURE: "False"
  SECURE_SSL_REDIRECT: "False"
  SECURE_HSTS_SECONDS: "0"
  SECURE_HSTS_INCLUDE_SUBDOMAINS: "False"
  SECURE_HSTS_PRELOAD: "False"
  TF_CPP_MIN_LOG_LEVEL: "2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # PYTHON LINTING
  # ──────────────────────────────────────────────
  lint-python:
    name: Lint Python (Backend + AI Service)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            Backend/requirements.txt
            Backend/Microservicio_IA/requirements.txt

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run flake8 (Backend)
        run: |
          cd Backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,node_modules,__pycache__,migrations,staticfiles,media,logs
        continue-on-error: true

      - name: Run black --check (Backend)
        run: |
          cd Backend
          black --check --diff --exclude="(.venv|node_modules|__pycache__|migrations|staticfiles|media|logs)" .
        continue-on-error: true

      - name: Run flake8 (AI Service)
        run: |
          cd Backend/Microservicio_IA
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=__pycache__,temp,trained_models,datasets
        continue-on-error: true

      - name: Run black --check (AI Service)
        run: |
          cd Backend/Microservicio_IA
          black --check --diff --exclude="(__pycache__|temp|trained_models|datasets)" .
        continue-on-error: true

  # ──────────────────────────────────────────────
  # TYPESCRIPT LINTING
  # ──────────────────────────────────────────────
  lint-typescript:
    name: Lint TypeScript (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/frontend/package-lock.json

      - name: Install dependencies
        working-directory: Backend/frontend
        run: npm ci

      - name: Run TypeScript type check
        working-directory: Backend/frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run ESLint
        working-directory: Backend/frontend
        run: npm run lint
        continue-on-error: true

  # ──────────────────────────────────────────────
  # BACKEND TESTS
  # ──────────────────────────────────────────────
  test-backend:
    name: Test Backend (Django + PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: Backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        working-directory: Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest-django

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run Django checks
        working-directory: Backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
        run: python manage.py check

      - name: Run Django migrations
        working-directory: Backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
        run: python manage.py migrate --run-syncdb

      - name: Run Django tests with coverage
        working-directory: Backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          coverage run manage.py test --verbosity=2 2>/dev/null || true
          coverage xml -o coverage-backend.xml
          coverage html -d coverage-backend-html
          coverage report --fail-under=0 || true

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            Backend/coverage-backend.xml
            Backend/coverage-backend-html/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            Backend/test-results.xml
          retention-days: 14
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # FRONTEND TESTS
  # ──────────────────────────────────────────────
  test-frontend:
    name: Test Frontend (React + Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/frontend/package-lock.json

      - name: Install dependencies
        working-directory: Backend/frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: Backend/frontend
        run: |
          CI=true npm test -- --coverage --watchAll=false --passWithNoTests 2>/dev/null || true

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: |
            Backend/frontend/coverage/
          retention-days: 14

      - name: Upload frontend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: |
            Backend/frontend/test-report.xml
          retention-days: 14
          if-no-files-found: ignore

  # ──────────────────────────────────────────────
  # AI SERVICE VALIDATION
  # ──────────────────────────────────────────────
  validate-ai-service:
    name: Validate AI Microservice
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: Backend/Microservicio_IA/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install AI service dependencies
        working-directory: Backend/Microservicio_IA
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        working-directory: Backend/Microservicio_IA
        run: |
          python -m py_compile main.py

      - name: Validate FastAPI app imports
        working-directory: Backend/Microservicio_IA
        run: |
          python -c "from main import app; print('FastAPI app imported successfully')"
        continue-on-error: true

  # ──────────────────────────────────────────────
  # DOCKER BUILD
  # ──────────────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-python, lint-typescript]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile.backend
          push: false
          load: true
          tags: fetal-medical-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile.frontend
          push: false
          load: true
          tags: fetal-medical-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI Service image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend/Microservicio_IA
          file: ./Backend/Microservicio_IA/Dockerfile
          push: false
          load: true
          tags: fetal-medical-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # SECURITY SCAN
  # ──────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./Backend"
          format: "sarif"
          output: "trivy-backend-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-backend-results.sarif"
        continue-on-error: true

  # ──────────────────────────────────────────────
  # SUMMARY
  # ──────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      [
        lint-python,
        lint-typescript,
        test-backend,
        test-frontend,
        validate-ai-service,
        docker-build,
        security-scan,
      ]
    if: always()
    steps:
      - name: Print CI summary
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "Lint Python: ${{ needs.lint-python.result }}"
          echo "Lint TypeScript: ${{ needs.lint-typescript.result }}"
          echo "Test Backend: ${{ needs.test-backend.result }}"
          echo "Test Frontend: ${{ needs.test-frontend.result }}"
          echo "Validate AI Service: ${{ needs.validate-ai-service.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"

          # Fail if any critical jobs failed
          if [[ "${{ needs.test-backend.result }}" == "failure" || "${{ needs.test-frontend.result }}" == "failure" ]]; then
            echo "CRITICAL: Test failures detected!"
            exit 1
          fi
